<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:white;font-family:'Segoe UI',sans-serif}
header{text-align:center;padding:30px 20px 10px}
header h1{font-size:2rem;color:#f0a500;letter-spacing:2px}
.search-bar{display:flex;justify-content:center;padding:15px 20px;gap:10px}
.search-bar input{width:70%;padding:10px 18px;border-radius:25px;border:2px solid #f0a500;background:#1a1a1a;color:white;font-size:1rem;outline:none}
.search-bar button{padding:10px 20px;background:#f0a500;color:#000;border:none;border-radius:25px;font-weight:bold;cursor:pointer}
.filter-buttons{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:10px 20px}
.filter-buttons button{padding:8px 20px;border:2px solid #f0a500;background:transparent;color:#f0a500;border-radius:25px;cursor:pointer;font-size:0.9rem;transition:all 0.3s}
.filter-buttons button:hover,.filter-buttons button.active{background:#f0a500;color:#000}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px;max-width:1200px;margin:auto}
.gallery-item{position:relative;overflow:hidden;border-radius:12px;cursor:pointer;aspect-ratio:4/3}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease}
.gallery-item:hover img{transform:scale(1.08)}
.overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:15px;transform:translateY(100%);transition:transform 0.3s ease}
.gallery-item:hover .overlay{transform:translateY(0)}
.overlay p{font-size:0.9rem;color:#f0a500;font-weight:bold}
.loading{text-align:center;padding:30px;color:#f0a500;font-size:1.1rem;display:none}
.no-results{text-align:center;padding:40px;color:#f0a500;font-size:1.1rem;display:none}
.load-more{display:none;margin:20px auto;padding:12px 35px;background:#f0a500;color:#000;border:none;border-radius:25px;font-size:1rem;font-weight:bold;cursor:pointer}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;justify-content:center;align-items:center;flex-direction:column}
.lightbox.active{display:flex}
.lightbox img{max-width:90%;max-height:75vh;border-radius:10px;object-fit:contain}
.lightbox-caption{margin-top:10px;color:#f0a500;font-size:1rem;text-align:center;padding:0 20px}
.lightbox-controls{display:flex;gap:20px;margin-top:15px}
.lightbox-controls button{padding:10px 25px;background:#f0a500;color:#000;border:none;border-radius:25px;font-size:1rem;cursor:pointer;font-weight:bold}
.close-btn{position:absolute;top:20px;right:25px;font-size:2rem;color:white;cursor:pointer;background:none;border:none}
@media(max-width:600px){
.gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}
header h1{font-size:1.4rem}
.search-bar input{width:60%}
}
</style>
</head>
<body>
<header><h1>Image Gallery</h1></header>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search any image..." onkeypress="if(event.key==='Enter')searchImages()"/>
<button onclick="searchImages()">Search</button>
</div>
<div class="filter-buttons">
<button class="active" onclick="loadCategory('nature',this)">Nature</button>
<button onclick="loadCategory('architecture',this)">Architecture</button>
<button onclick="loadCategory('travel',this)">Travel</button>
<button onclick="loadCategory('food',this)">Food</button>
<button onclick="loadCategory('technology',this)">Technology</button>
</div>
<div class="gallery" id="gallery"></div>
<div class="loading" id="loading">Loading...</div>
<div class="no-results" id="noResults">No images found!</div>
<button class="load-more" id="loadMoreBtn" onclick="loadMore()">Load More</button>
<div class="lightbox" id="lightbox">
<button class="close-btn" onclick="closeLightbox()">✕</button>
<img id="lightbox-img" src="" alt=""/>
<p class="lightbox-caption" id="lightbox-caption"></p>
<div class="lightbox-controls">
<button onclick="changeImage(-1)">&#8592; Prev</button>
<button onclick="changeImage(1)">Next &#8594;</button>
</div>
</div>
<script>
const API_KEY='56465380-92458c534780589651a343896';
let currentImages=[];
let currentPage=1;
let currentQuery='nature';
let currentIndex=0;

async function fetchImages(query,page=1){
document.getElementById('loading').style.display='block';
document.getElementById('noResults').style.display='none';
document.getElementById('loadMoreBtn').style.display='none';
try{
const res=await fetch(`https://pixabay.com/api/?key=${API_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=12&page=${page}&safesearch=true`);
const data=await res.json();
return data.hits||[];
}catch(e){
console.error(e);
return[];
}finally{
document.getElementById('loading').style.display='none';
}
}

async function loadCategory(query,btn){
document.querySelectorAll('.filter-buttons button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
currentQuery=query;
currentPage=1;
document.getElementById('searchInput').value='';
const imgs=await fetchImages(query,1);
currentImages=imgs;
renderGallery(imgs,false);
if(!imgs.length)document.getElementById('noResults').style.display='block';
else document.getElementById('loadMoreBtn').style.display='block';
}

async function searchImages(){
const q=document.getElementById('searchInput').value.trim();
if(!q)return;
currentQuery=q;
currentPage=1;
document.querySelectorAll('.filter-buttons button').forEach(b=>b.classList.remove('active'));
const imgs=await fetchImages(q,1);
currentImages=imgs;
renderGallery(imgs,false);
if(!imgs.length)document.getElementById('noResults').style.display='block';
else document.getElementById('loadMoreBtn').style.display='block';
}

async function loadMore(){
currentPage++;
const imgs=await fetchImages(currentQuery,currentPage);
currentImages=[...currentImages,...imgs];
renderGallery(imgs,true);
}

function renderGallery(imgs,append){
const gallery=document.getElementById('gallery');
if(!append)gallery.innerHTML='';
imgs.forEach((img,i)=>{
const idx=append?currentImages.length-imgs.length+i:i;
const item=document.createElement('div');
item.className='gallery-item';
item.innerHTML=`<img src="${img.webformatURL}" alt="${img.tags}" loading="lazy"/><div class="overlay"><p>${img.tags.split(',')[0]}</p></div>`;
item.onclick=()=>openLightbox(idx);
gallery.appendChild(item);
});
}

function openLightbox(index){
currentIndex=index;
updateLightbox();
document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(){
document.getElementById('lightbox').classList.remove('active');
}

function changeImage(dir){
currentIndex=(currentIndex+dir+currentImages.length)%currentImages.length;
updateLightbox();
}

function updateLightbox(){
const img=currentImages[currentIndex];
document.getElementById('lightbox-img').src=img.largeImageURL;
document.getElementById('lightbox-caption').textContent=img.tags;
}

loadCategory('nature',document.querySelector('.filter-buttons button'));
</script>
</body>
</html>
