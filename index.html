<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:white;font-family:'Segoe UI',sans-serif}
header{text-align:center;padding:30px 20px 10px}
header h1{font-size:2rem;color:#f0a500;letter-spacing:2px}
.search-bar{display:flex;justify-content:center;padding:15px 20px;gap:10px}
.search-bar input{width:70%;padding:10px 18px;border-radius:25px;border:2px solid #f0a500;background:#1a1a1a;color:white;font-size:1rem;outline:none}
.search-bar button{padding:10px 20px;background:#f0a500;color:#000;border:none;border-radius:25px;font-weight:bold;cursor:pointer}
.filter-buttons{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:10px 20px}
.filter-buttons button{padding:8px 20px;border:2px solid #f0a500;background:transparent;color:#f0a500;border-radius:25px;cursor:pointer;font-size:0.9rem;transition:all 0.3s}
.filter-buttons button:hover,.filter-buttons button.active{background:#f0a500;color:#000}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:20px;max-width:1200px;margin:auto}
.gallery-item{position:relative;overflow:hidden;border-radius:12px;cursor:pointer;aspect-ratio:4/3}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease}
.gallery-item:hover img{transform:scale(1.08)}
.overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:15px;transform:translateY(100%);transition:transform 0.3s ease}
.gallery-item:hover .overlay{transform:translateY(0)}
.overlay p{font-size:0.9rem;color:#f0a500;font-weight:bold}
.no-results{text-align:center;padding:40px;color:#f0a500;font-size:1.1rem}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;justify-content:center;align-items:center;flex-direction:column}
.lightbox.active{display:flex}
.lightbox img{max-width:90%;max-height:75vh;border-radius:10px;object-fit:contain}
.lightbox-caption{margin-top:10px;color:#f0a500;font-size:1rem}
.lightbox-controls{display:flex;gap:20px;margin-top:15px}
.lightbox-controls button{padding:10px 25px;background:#f0a500;color:#000;border:none;border-radius:25px;font-size:1rem;cursor:pointer;font-weight:bold}
.close-btn{position:absolute;top:20px;right:25px;font-size:2rem;color:white;cursor:pointer;background:none;border:none}
@media(max-width:600px){
.gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}
header h1{font-size:1.4rem}
.search-bar input{width:60%}
}
</style>
</head>
<body>
<header><h1>Image Gallery</h1></header>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search images..." onkeypress="if(event.key==='Enter')searchImages()"/>
<button onclick="searchImages()">Search</button>
</div>
<div class="filter-buttons">
<button class="active" onclick="filterGallery('all',this)">All</button>
<button onclick="filterGallery('nature',this)">Nature</button>
<button onclick="filterGallery('architecture',this)">Architecture</button>
<button onclick="filterGallery('travel',this)">Travel</button>
</div>
<div class="gallery" id="gallery"></div>
<div class="no-results" id="noResults" style="display:none">No images found!</div>
<div class="lightbox" id="lightbox">
<button class="close-btn" onclick="closeLightbox()">✕</button>
<img id="lightbox-img" src="" alt=""/>
<p class="lightbox-caption" id="lightbox-caption"></p>
<div class="lightbox-controls">
<button onclick="changeImage(-1)">&#8592; Prev</button>
<button onclick="changeImage(1)">Next &#8594;</button>
</div>
</div>
<script>
const images=[
{src:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600",category:"nature",title:"Mountain Peaks"},
{src:"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600",category:"nature",title:"Forest Path"},
{src:"https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600",category:"nature",title:"Foggy Hills"},
{src:"https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600",category:"nature",title:"Green Valley"},
{src:"https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600",category:"nature",title:"Aerial Nature"},
{src:"https://images.unsplash.com/photo-1486325212027-8081e485255e?w=600",category:"architecture",title:"City Skyline"},
{src:"https://images.unsplash.com/photo-1431274172761-fca41d930114?w=600",category:"architecture",title:"Paris Streets"},
{src:"https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=600",category:"architecture",title:"Night City"},
{src:"https://images.unsplash.com/photo-1555993539-1732b0258235?w=600",category:"architecture",title:"Modern Bridge"},
{src:"https://images.unsplash.com/photo-1488085061387-422e29b40080?w=600",category:"travel",title:"Santorini"},
{src:"https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=600",category:"travel",title:"Lake View"},
{src:"https://images.unsplash.com/photo-1503220317375-aaad61436b1b?w=600",category:"travel",title:"Beach Sunset"}
];

let filtered=[...images];
let currentIndex=0;

function renderGallery(list){
const gallery=document.getElementById('gallery');
gallery.innerHTML='';
if(list.length===0){
document.getElementById('noResults').style.display='block';
return;
}
document.getElementById('noResults').style.display='none';
list.forEach((img,i)=>{
const item=document.createElement('div');
item.className='gallery-item';
item.innerHTML=`<img src="${img.src}" alt="${img.title}" loading="lazy"/><div class="overlay"><p>${img.title}</p></div>`;
item.onclick=()=>openLightbox(i);
gallery.appendChild(item);
});
}

function filterGallery(cat,btn){
document.querySelectorAll('.filter-buttons button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('searchInput').value='';
filtered=cat==='all'?[...images]:images.filter(img=>img.category===cat);
renderGallery(filtered);
}

function searchImages(){
const q=document.getElementById('searchInput').value.toLowerCase().trim();
if(!q){
filtered=[...images];
renderGallery(filtered);
return;
}
document.querySelectorAll('.filter-buttons button').forEach(b=>b.classList.remove('active'));
filtered=images.filter(img=>img.title.toLowerCase().includes(q)||img.category.toLowerCase().includes(q));
renderGallery(filtered);
}

function openLightbox(index){
currentIndex=index;
updateLightbox();
document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(){
document.getElementById('lightbox').classList.remove('active');
}

function changeImage(dir){
currentIndex=(currentIndex+dir+filtered.length)%filtered.length;
updateLightbox();
}

function updateLightbox(){
document.getElementById('lightbox-img').src=filtered[currentIndex].src;
document.getElementById('lightbox-caption').textContent=filtered[currentIndex].title;
}

renderGallery(images);
</script>
</body>
</html>
